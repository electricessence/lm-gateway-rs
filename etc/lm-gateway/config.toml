# lm-gateway configuration — 3-tier local routing
# Routes to qwen3:1.7b (Q4_K_M) / qwen3:1.7b+think / qwen3:14b (Q4_K_M) via Ollama
#
# Classification label ladder (lightest → heaviest):
#   instant          qwen3:1.7b                 think=false   ~300ms   greetings, trivial facts
#   instant-think    qwen3:1.7b                 think=true    ~2s      trivial with mild CoT
#   moderate         qwen3:1.7b                 think=true    ~2-4s    device cmds (tools OK, thinking forced off for tool_calls)
#   moderate-think   qwen3:1.7b                 think=true    ~2-4s    same — think already on
#   deep             qwen3:14b                  think=false   ~5s      complex queries, multi-entity, synthesis
#   deep-think       qwen3:14b                  think=true    ~30s+    hardest problems + full CoT

[gateway]
client_port          = 8080
admin_port           = 8081
traffic_log_capacity = 500
log_level            = "info"
admin_token_env      = "LMG_ADMIN_TOKEN"
# Unauthenticated LAN requests fall through to this profile instead of 401.
public_profile       = "ha-auto"

# ---------------------------------------------------------------------------
# Backend — local Ollama on the same container
# ---------------------------------------------------------------------------
[backends.ollama]
provider    = "ollama"
base_url    = "http://127.0.0.1:11434"
# Allow up to 5 minutes for non-streaming calls — covers cold-start
# (model load can take 30–90 s) and avoids the 30-second default cutoff.
# Streaming requests use a separate no-timeout client and are unaffected.
timeout_ms  = 300000

# ---------------------------------------------------------------------------
# Tiers — ordered by cost/latency (cheapest first)
#
# Router index mapping (n=3):
#   instant  → index 0 → local:instant   (1.7b)
#   moderate → index 1 → local:moderate  (7b)
#   deep     → index 2 → local:deep      (14b)
#
# The classifier's "-think" suffix injects think=true on the elected tier:
#   instant-think  → local:instant   + think=true
#   moderate-think → local:moderate  + think=true
#   deep-think     → local:deep      + think=true
# ---------------------------------------------------------------------------
[[tiers]]
name    = "local:instant"
backend = "ollama"
model   = "qwen3:1.7b"
think   = false

[[tiers]]
name    = "local:moderate"
backend = "ollama"
model   = "qwen3:1.7b"
think   = true

[[tiers]]
name    = "local:deep"
backend = "ollama"
model   = "qwen3:14b"
think   = false

# ---------------------------------------------------------------------------
# Aliases — map Ollama model names (as sent by clients) to gateway tiers
# ---------------------------------------------------------------------------
[aliases]
# HA sends "ha-auto:latest"; entry-point alias for classify mode.
"ha-auto:latest" = "local:instant"
"ha-auto"        = "local:instant"

# Hint aliases for Open WebUI / other clients.
"hint:instant"          = "local:instant"
"hint:moderate"         = "local:moderate"
"hint:deep"             = "local:deep"
"hint:moderate-think"   = "local:moderate"
"hint:deep-think"       = "local:deep"

# ---------------------------------------------------------------------------
# Clients — API key → profile bindings (keys loaded from env vars)
# ---------------------------------------------------------------------------

[[clients]]
key_env = "LMG_HA_KEY"
profile = "ha-auto"

# ---------------------------------------------------------------------------
# Profiles — these are the "models" Ollama clients see in /api/tags
# ---------------------------------------------------------------------------

# "ha-auto:latest" — what Home Assistant sees and uses.
#
# 3-label classify: qwen3:1.7b pre-flight routes to the right tier.
#   moderate — single device command, lock, switch, climate (qwen2.5:7b, tools OK, ~2s)
#   deep     — state query, multi-entity, scene/routine, context phrase (qwen3:14b, ~5s)
#   instant  — greeting, chitchat, general trivia with no home action (qwen3:1.7b)
[profiles.ha-auto]
mode              = "classify"
classifier        = "local:instant"
max_auto_tier     = "local:deep"
classifier_prompt = """\
Route this Home Assistant request. Reply with one word: instant, moderate, or deep.

  Turn on the kitchen lights                               -> moderate
  Lock the front door                                      -> moderate
  Set the thermostat to 72                                 -> moderate
  Dim the office light to 40%                              -> moderate
  Play music in the bedroom                                -> moderate
  Turn off the TV                                          -> moderate
  What is the living room temperature?                     -> deep
  What is the temperature outside?                         -> deep
  Are any lights on downstairs?                            -> deep
  Is the garage door open?                                 -> deep
  Turn off all the lights                                  -> deep
  Lock everything up                                       -> deep
  Goodnight                                                -> deep
  Good morning                                             -> deep
  I'm home                                                 -> deep
  I'm leaving                                              -> deep
  Heading out                                              -> deep
  Hi                                                       -> instant
  How are you                                              -> instant
  Tell me a joke                                           -> instant
  What's the capital of France?                            -> instant
  What's 2+2?                                              -> instant

Reply with one word only: instant, moderate, or deep.\
"""
system_prompt = """\
You are a voice-activated Home Assistant controller.

TOOL USE:
- Call a tool immediately and directly when the user requests a home action.
- Choose the entity whose name most closely matches what the user said, using only names present in the provided entity list.
- When multiple entities match (e.g. two office lights), call the tool once per matching entity.
- Respond with a brief confirmation after tool results arrive: "Done." or "Office lights are off."
- For requests about things outside the entity list (weather, external services), answer from general knowledge in one sentence.

ENTITY NAMES:
- Copy the entity name exactly as it appears in the provided list — spelling, capitalisation, and all.
- When the user's wording is ambiguous, pick the closest match from the list and act on it.
- When no entity is a reasonable match, ask the user to clarify with one short question.

LOCKS:
- "lock" / "lock up" / "lock the door" = HassTurnOn(domain=lock).
- "unlock" = HassTurnOff(domain=lock).

STATE QUERIES:
- Call the relevant tool, then answer in one sentence using the value returned.

AUTOMATIONS:
- Toggle with the appropriate tool and confirm briefly.
- Creating or editing automation logic requires the Home Assistant UI — say so in one sentence.

GENERAL:
- One sentence for facts and confirmations.
"""

# "ha-auto:fast:latest" — same classifier, capped at local:moderate (7b).
#
# Trade-off: ~2s warm responses (vs ~5s on deep) at some accuracy cost.
# Good for users who prefer speed and are OK with occasional re-phrasing.
[profiles."ha-auto:fast"]
mode              = "classify"
classifier        = "local:instant"
max_auto_tier     = "local:moderate"
classifier_prompt = """\
You route requests to a Home Assistant voice assistant.

Apply rules in order:
1. Involves any home device, appliance, lock, light, thermostat, climate, sensor, or home system → moderate
2. Checks or queries any home state, condition, or status → moderate
3. A greeting, chitchat, or purely factual question with zero home action → instant

Reply with exactly one word: instant or moderate.\
"""
system_prompt = """\
You are a voice-activated Home Assistant controller.

TOOL USE:
- Call a tool immediately and directly when the user requests a home action.
- Choose the entity whose name most closely matches what the user said, using only names present in the provided entity list.
- When multiple entities match (e.g. two office lights), call the tool once per matching entity.
- Respond with a brief confirmation after tool results arrive: "Done." or "Office lights are off."
- For requests about things outside the entity list (weather, external services), answer from general knowledge in one sentence.

ENTITY NAMES:
- Copy the entity name exactly as it appears in the provided list — spelling, capitalisation, and all.
- When the user's wording is ambiguous, pick the closest match from the list and act on it.
- When no entity is a reasonable match, ask the user to clarify with one short question.

LOCKS:
- "lock" / "lock up" / "lock the door" = HassTurnOn(domain=lock).
- "unlock" = HassTurnOff(domain=lock).

STATE QUERIES:
- Call the relevant tool, then answer in one sentence using the value returned.

AUTOMATIONS:
- Toggle with the appropriate tool and confirm briefly.
- Creating or editing automation logic requires the Home Assistant UI — say so in one sentence.

GENERAL:
- One sentence for facts and confirmations.
"""

# "general:latest" — generic smart router for Open WebUI and other LAN clients.
[profiles.general]
mode              = "classify"
classifier        = "local:instant"
max_auto_tier     = "local:deep"
classifier_prompt = """\
Classify this request. Reply with exactly one label.

instant          — greeting, one-word fact, no reasoning needed          (1.7b)
instant-think    — simple question with mild uncertainty                 (1.7b + CoT)
moderate         — explanation, code, analysis, device commands           (7b)
  moderate-think   — moderate task that benefits from step-by-step         (7b + CoT)
deep             — complex code, architecture, detailed analysis         (14b)
deep-think       — hardest problems, multi-step reasoning, design        (14b + CoT)

Reply with one word only: instant, instant-think, moderate, moderate-think, deep, or deep-think.\
"""
system_prompt = """\
You are a concise and helpful AI assistant.
- Answer directly without unnecessary preamble or apologies.
- For code: add brief comments; use idiomatic style for the language.
- For explanations: match depth to complexity — one sentence for facts, structured detail for concepts.
- For design and architecture: give concrete recommendations with trade-offs.
"""

# "default" profile — fallback for unauthenticated /v1/chat/completions requests.
[profiles.default]
mode              = "classify"
classifier        = "local:instant"
max_auto_tier     = "local:deep"
classifier_prompt = """\
Classify this request. Reply with exactly one label.

instant          — greeting, one-word fact, no reasoning needed          (1.7b)
instant-think    — simple question with mild uncertainty                 (1.7b + CoT)
moderate         — explanation, code, analysis (clear task)              (8b)
moderate-think   — moderate task that benefits from step-by-step         (8b + CoT)
deep             — complex code, architecture, detailed analysis         (14b)
deep-think       — hardest problems, multi-step reasoning, design        (14b + CoT)

Reply with one word only: instant, instant-think, moderate, moderate-think, deep, or deep-think.\
"""
