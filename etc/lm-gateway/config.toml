# lm-gateway configuration — 3-tier local routing
# Routes to qwen3:1.7b / 8b / 14b via Ollama

[gateway]
client_port          = 8080
admin_port           = 8081
traffic_log_capacity = 500
log_level            = "info"
admin_token_env      = "LMG_ADMIN_TOKEN"
# Unauthenticated LAN requests fall through to this profile instead of 401.
public_profile       = "ha-auto"

# ---------------------------------------------------------------------------
# Backend — local Ollama on the same container
# ---------------------------------------------------------------------------
[backends.ollama]
provider = "ollama"
base_url = "http://127.0.0.1:11434"

# ---------------------------------------------------------------------------
# Tiers — cheapest → most capable (never exposed directly to Ollama clients)
# ---------------------------------------------------------------------------
[[tiers]]
name    = "local:instant"
backend = "ollama"
model   = "qwen3:1.7b"
think   = false

[[tiers]]
name    = "local:balanced"
backend = "ollama"
model   = "qwen3:8b"
think   = false

[[tiers]]
name    = "local:expert"
backend = "ollama"
model   = "qwen3:14b"
think   = true

# ---------------------------------------------------------------------------
# Aliases — map Ollama model names (as sent by clients) to gateway tiers
# ---------------------------------------------------------------------------
[aliases]
# HA sends "ha-auto:latest"; route directly to qwen3:8b for reliable tool calling.
"ha-auto:latest" = "local:balanced"
"ha-auto"        = "local:balanced"

# OpenAI-style aliases for Open WebUI / other clients.
"hint:instant" = "local:instant"
"hint:fast"    = "local:balanced"
"hint:deep"    = "local:expert"

# ---------------------------------------------------------------------------
# Clients — API key → profile bindings (keys loaded from env vars)
# ---------------------------------------------------------------------------

[[clients]]
key_env = "LMG_HA_KEY"
profile = "ha-auto"

# ---------------------------------------------------------------------------
# Profiles — these are the "models" Ollama clients see in /api/tags
# ---------------------------------------------------------------------------

# "ha-auto:latest" — what Home Assistant sees and uses.
# Dispatch mode: alias routes ha-auto:latest → local:balanced (qwen3:8b) directly.
# qwen3:8b reliably executes tool calls; qwen3:1.7b does not.
# System prompt tunes every response for HA voice/chat context.
[profiles.ha-auto]
mode          = "dispatch"
classifier    = "local:balanced"
max_auto_tier = "local:expert"
system_prompt = """\
/no_think
You are a voice-activated assistant integrated with Home Assistant.

DEVICE COMMANDS (lights, locks, switches, climate, covers):
- ALWAYS call the appropriate tool. Never describe what you will do in text; just call the tool.
- Use the exact device name or area name from the provided entity list. Do not invent names.
- If the request matches multiple entities (e.g. "office lights" with two office lights), call the tool once per entity.
- After receiving tool results, confirm briefly: "Done." or "Office lights are off."

STATE QUERIES ("is X on?", "what is the temperature?"):
- Answer in one sentence using the value from the tool result.

AUTOMATION TOGGLE (enable, disable, turn on, turn off):
- Call the appropriate tool (automation.turn_on, automation.turn_off, or automation.toggle).
- Confirm briefly once done.

AUTOMATION CREATE / EDIT:
- You cannot create or change automation logic through this interface.
- Respond with one sentence: "Creating or editing automation logic requires the Home Assistant UI."

GENERAL:
- One sentence for simple facts.
"""

# "general:latest" — generic smart router. Used by Open WebUI and other LAN clients.
[profiles.general]
mode              = "classify"
classifier        = "local:instant"
max_auto_tier     = "local:expert"
classifier_prompt = """\
You are a request router. Reply with one word only.
Labels: instant, fast, deep

Output tier based on response length needed:
  instant = one sentence  |  fast = one paragraph  |  deep = multiple paragraphs

Examples:
  What is 2+2?                       -> instant
  What does OAuth mean?              -> fast
  Write a function to sort a list    -> fast
  Explain how TCP/IP works           -> fast
  Design a distributed cache system  -> deep
  Debug this complex algorithm       -> deep

Reply with one word only.
"""
system_prompt = """\
You are a concise and helpful AI assistant.
- Answer directly without unnecessary preamble or apologies.
- For code: add brief comments; use idiomatic style for the language.
- For explanations: match depth to complexity — one sentence for facts, structured detail for concepts.
- For design and architecture: give concrete recommendations with trade-offs.
"""

# "default" profile — fallback for unauthenticated /v1/chat/completions requests.
[profiles.default]
mode              = "classify"
classifier        = "local:instant"
max_auto_tier     = "local:balanced"
classifier_prompt = """\
You are a request router. Reply with one word only.
Labels: instant, fast, deep

Output tier based on response length needed:
  instant = one sentence  |  fast = one paragraph  |  deep = multiple paragraphs

Examples:
  What is 2+2?                       -> instant
  What does OAuth mean?              -> fast
  Write a function to sort a list    -> fast
  Explain how TCP/IP works           -> fast
  Design a distributed cache system  -> deep
  Debug this complex algorithm       -> deep

Reply with one word only.
"""
